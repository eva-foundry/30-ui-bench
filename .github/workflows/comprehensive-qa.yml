      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('comprehensive-qa-report.json', 'utf8'));
            const iconFor = (result) => result === 'success' ? '✅' : '❌';
            const codeQuality = iconFor('${{ needs.code-quality.result }}');
            const consistency = iconFor('${{ needs.consistency.result }}');
            const testing = iconFor('${{ needs.testing.result }}');
            const evidence = iconFor('${{ needs.evidence.result }}');
            const integration = iconFor('${{ needs.integration.result }}');
            
            const comment = `## 📊 Comprehensive QA Report
            
            **51 Acceptance Criteria Validation**
            
            | Category | Gates | Status |
            |----------|-------|--------|
            | Code Quality | 5 | ${codeQuality} |
            | Consistency | 4 | ${consistency} |
            | Testing | 5 | ${testing} |
            | Evidence | 5 | ${evidence} |
            | Integration | 5 | ${integration} |
            
            **Automated**: 25 gates executed  
            **Manual**: 26 gates require human verification  
            **Full Report**: See artifacts for detailed results
            
            ---
            *Workflow Run: ${{ github.run_id }}*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
