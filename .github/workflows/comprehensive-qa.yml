name: Comprehensive QA - Sprint 11 Handoff Gate

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      skip_manual_gates:
        description: Skip manual verification gates
        required: false
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - '.github/workflows/comprehensive-qa.yml'
      - 'STATUS.md'
      - 'PLAN.md'
      - 'ACCEPTANCE.md'
      - 'docs/**'
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20.x'
  PROJECT31_REPO: eva-foundry/31-eva-faces
  PROJECT31_PATH: 31-eva-faces
  PROJECT37_REPO: eva-foundry/37-data-model
  PROJECT37_PATH: project37-runtime
  UI_PATH: project37-runtime/ui
  EVIDENCE_PATH: evidence
  DATA_MODEL_BASE: https://msub-eva-data-model.victoriousgrass-30debbd3.canadacentral.azurecontainerapps.io

jobs:
  client-verification:
    name: Client Verification Against Project 37 UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project 30 governance surface
        uses: actions/checkout@v4

      - name: Checkout Project 31 shared templates
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PROJECT31_REPO }}
          path: ${{ env.PROJECT31_PATH }}

      - name: Checkout Project 37 runtime UI
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PROJECT37_REPO }}
          path: ${{ env.PROJECT37_PATH }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.UI_PATH }}/package-lock.json

      - name: Install Project 37 UI dependencies
        working-directory: ${{ env.UI_PATH }}
        run: npm ci

      - name: Focused Sprint 11 route tests
        working-directory: ${{ env.UI_PATH }}
        run: |
          set +e
          npm run test -- \
            src/pages/portal/PersonaLoginPage.test.tsx \
            src/pages/portal/PersonaExperienceDashboardPage.test.tsx \
            src/pages/admin/ActAsPage.test.tsx \
            src/pages/admin/RbacResponsibilitiesPage.test.tsx \
            src/pages/admin/A11yThemesPage.test.tsx \
            > focused-test-report.txt 2>&1
          EXIT_CODE=$?
          set -e
          cat focused-test-report.txt
          exit $EXIT_CODE

      - name: TypeScript gate
        working-directory: ${{ env.UI_PATH }}
        run: |
          set +e
          npm run type-check > typecheck-report.txt 2>&1
          EXIT_CODE=$?
          set -e
          cat typecheck-report.txt
          exit $EXIT_CODE

      - name: Build gate
        working-directory: ${{ env.UI_PATH }}
        run: |
          set +e
          npm run build > build-report.txt 2>&1
          EXIT_CODE=$?
          set -e
          cat build-report.txt
          exit $EXIT_CODE

      - name: Lint gate (warning-only tolerated)
        working-directory: ${{ env.UI_PATH }}
        run: |
          set +e
          npm run lint > lint-report.txt 2>&1
          EXIT_CODE=$?
          set -e
          cat lint-report.txt
          if grep -q "error" lint-report.txt; then
            echo "[FAIL] Lint reported errors"
            exit 1
          fi
          exit 0

      - name: Upload client verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project30-client-verification
          path: |
            ${{ env.UI_PATH }}/focused-test-report.txt
            ${{ env.UI_PATH }}/typecheck-report.txt
            ${{ env.UI_PATH }}/build-report.txt
            ${{ env.UI_PATH }}/lint-report.txt

  governance-check:
    name: Governance And Data Model Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project 30 governance surface
        uses: actions/checkout@v4

      - name: Verify Project 30 data model record
        run: |
          curl --fail --silent "$DATA_MODEL_BASE/model/projects/30-ui-bench" > project-record.json
          grep '"id"' project-record.json

      - name: Verify Project 30 handoff evidence exists
        shell: bash
        run: |
          test -f docs/20260315_223500-project37-ui-handoff.md
          test -f STATUS.md
          test -f ACCEPTANCE.md
          test -f PLAN.md

      - name: Create governance manifest
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          manifest = {
              'generated_at': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'project': '30-ui-bench',
              'workflow': 'comprehensive-qa-sprint-11-handoff-gate',
              'target_environment': os.environ.get('TARGET_ENVIRONMENT', 'staging'),
              'inputs': {
                  'skip_manual_gates': os.environ.get('SKIP_MANUAL_GATES', 'true'),
              },
              'governance_surface': {
                  'status': Path('STATUS.md').exists(),
                  'plan': Path('PLAN.md').exists(),
                  'acceptance': Path('ACCEPTANCE.md').exists(),
                  'handoff': Path('docs/20260315_223500-project37-ui-handoff.md').exists(),
              },
          }

          Path('governance-manifest.json').write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          PY
        env:
          TARGET_ENVIRONMENT: ${{ github.event.inputs.target_environment || 'staging' }}
          SKIP_MANUAL_GATES: ${{ github.event.inputs.skip_manual_gates || 'true' }}

      - name: Upload governance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: project30-governance-check
          path: |
            project-record.json
            governance-manifest.json

  report:
    name: Publish Sprint 11 QA Report
    runs-on: ubuntu-latest
    needs:
      - client-verification
      - governance-check
    if: always()

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Build summary
        shell: bash
        run: |
          {
            echo "## Project 30 Sprint 11 Handoff Gate"
            echo ""
            echo "- Client verification: ${{ needs.client-verification.result }}"
            echo "- Governance check: ${{ needs.governance-check.result }}"
            echo "- Target environment: ${{ github.event.inputs.target_environment || 'staging' }}"
            echo "- Skip manual gates: ${{ github.event.inputs.skip_manual_gates || 'true' }}"
            echo ""
            echo "This workflow validates the active Project 37 UI surface while treating Project 30 as the governance-and-handoff authority."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const client = '${{ needs.client-verification.result }}' === 'success' ? 'PASS' : 'FAIL';
            const governance = '${{ needs.governance-check.result }}' === 'success' ? 'PASS' : 'FAIL';
            const body = [
              '## Project 30 Sprint 11 Handoff Gate',
              '',
              `- Client verification: ${client}`,
              `- Governance check: ${governance}`,
              '',
              'This PR was validated against the active Project 37 UI runtime surface and the Project 30 governance packet.'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
